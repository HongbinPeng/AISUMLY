services:
  mysql:
    image: mysql:8.4
    container_name: aisumly-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: aisumly
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      TZ: Asia/Shanghai
    ports: #生产环境记得删掉该配置
      - "3306:3306" 
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_0900_ai_ci
      - --default-time-zone=+08:00
    volumes:
      - ./docker-data/mysql:/var/lib/mysql
      - ./数据库表设计.sql:/docker-entrypoint-initdb.d/001-schema.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-u${MYSQL_USER}", "-p${MYSQL_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - aisumly

  redis:
    image: redis:7.4
    container_name: aisumly-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    ports: #生产环境记得删掉该配置
      - "6379:6379"
    volumes:
      - ./docker-data/redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - aisumly

  rabbitmq:
    image: rabbitmq:3.13-management
    container_name: aisumly-rabbitmq
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_DEFAULT_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_DEFAULT_PASS}
      TZ: Asia/Shanghai
    ports: #生产环境记得删掉该配置
      - "5672:5672"
      - "15672:15672"
    volumes:
      - ./docker-data/rabbitmq:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - aisumly

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: aisumly-backend
    restart: unless-stopped
    env_file: #记得改为自己的.env文件
      - .env
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    expose:
      - "8080"
    networks:
      - aisumly

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: aisumly-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - aisumly

networks:
  aisumly:
    driver: bridge
